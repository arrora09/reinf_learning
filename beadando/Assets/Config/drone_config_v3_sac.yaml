
# Használat: mlagents-learn config/drone_config_v3_sac.yaml --run-id=drone_v3_sac

behaviors:
  DroneDelivery:
    trainer_type: sac           
    
    hyperparameters:
      batch_size: 256
      buffer_size: 500000
      buffer_init_steps: 5000
      learning_rate: 3.0e-4
      learning_rate_schedule: constant
      tau: 0.005
      steps_per_update: 10.0
      save_replay_buffer: false
      init_entcoef: 0.5
      reward_signal_steps_per_update: 10.0
    
    network_settings:
      normalize: true
      hidden_units: 256
      num_layers: 3
      vis_encode_type: simple
    
    reward_signals:
      extrinsic:
        gamma: 0.99
        strength: 1.0
    
    max_steps: 5000000
    time_horizon: 512
    summary_freq: 10000
    keep_checkpoints: 5
    checkpoint_interval: 250000
    threaded: true
