# Használat: mlagents-learn config/drone_config_v2.yaml --run-id=drone_v2_large

behaviors:
  DroneDelivery:
    trainer_type: ppo
    
    hyperparameters:
      batch_size: 4096
      buffer_size: 40960
      learning_rate: 1.0e-4       
      learning_rate_schedule: linear
      beta: 1.0e-2                 
      epsilon: 0.2
      lambd: 0.95
      num_epoch: 5                 
    
    network_settings:
      normalize: true
      hidden_units: 512             
      num_layers: 4                
      vis_encode_type: simple
    
    reward_signals:
      extrinsic:
        gamma: 0.995               
        strength: 1.0
      curiosity:
        gamma: 0.99
        strength: 0.01
        encoding_size: 256
        learning_rate: 1.0e-4
    
    max_steps: 5000000
    time_horizon: 1024             
    summary_freq: 10000
    keep_checkpoints: 5
    checkpoint_interval: 250000
    threaded: true
