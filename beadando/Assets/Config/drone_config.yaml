# Használat: mlagents-learn Assets/Config/drone_config.yaml --run-id=drone_v1

behaviors:
  DroneDelivery:
    trainer_type: ppo
    
    hyperparameters:
      batch_size: 2048
      buffer_size: 20480
      learning_rate: 3.0e-4
      learning_rate_schedule: linear
      beta: 5.0e-3         
      epsilon: 0.2          
      lambd: 0.95            
      num_epoch: 3
    
    network_settings:
      normalize: true
      hidden_units: 256
      num_layers: 3
      vis_encode_type: simple
    
    reward_signals:
      extrinsic:
        gamma: 0.99
        strength: 1.0
      curiosity:
        gamma: 0.99
        strength: 0.02
        encoding_size: 256
        learning_rate: 3.0e-4
    
    max_steps: 5000000
    time_horizon: 512
    summary_freq: 10000
    keep_checkpoints: 5
    checkpoint_interval: 250000
    threaded: true
